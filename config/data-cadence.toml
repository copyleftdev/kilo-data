schema = "kilo.data-cadence.v1"

[channels.base]
schedule_utc = "37 5 * * *"
release_kind = "immutable"
maximum_release_age = "36h"

[channels.edge]
schedule_utc = "7,22,37,52 * * * *"
release_kind = "rolling"
maximum_release_age = "45m"

[[source_policy]]
source_id = "feodo-c2"
channel = "edge"
upstream_cadence = "5m"
target_cadence = "15m"
maximum_age = "45m"

[[source_policy]]
source_id = "tor-exits"
channel = "edge"
upstream_cadence = "continuous"
target_cadence = "15m"
maximum_age = "45m"

[[source_policy]]
source_id = "spamhaus-drop-family"
channel = "base"
upstream_cadence = "daily"
target_cadence = "daily"
maximum_age = "48h"

[[source_policy]]
